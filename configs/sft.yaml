# SFT configuration
model:
  base_model: "Qwen/Qwen2.5-1.5B"
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  dataset_name: "ai4bharat/indic-align"  # confirm exact name Day 2
  language: "hi"
  max_seq_length: 1024
  train_size: 50000
  val_size: 500

training:
  output_dir: "checkpoints/sft"
  num_train_epochs: 1
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  logging_steps: 10
  save_steps: 200
  eval_steps: 200
  bf16: true
  gradient_checkpointing: true
  optim: "paged_adamw_8bit"
  report_to: "wandb"

hub:
  push_to_hub: true
  hub_model_id: "psaesha/llm-post-trained-qwen2.5-1.5B"
